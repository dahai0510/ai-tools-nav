<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI 工具导航</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0f;
    --bg2: #111118;
    --bg3: #1a1a24;
    --bg4: #22222f;
    --surface: #1e1e2a;
    --surface2: #252535;
    --border: rgba(255,255,255,0.07);
    --border2: rgba(255,255,255,0.12);
    --text: #f0f0f8;
    --text2: #9898b0;
    --text3: #5a5a72;
    --accent: #7c6af7;
    --accent2: #5b4de0;
    --accent-glow: rgba(124,106,247,0.15);
    --teal: #2de0c4;
    --amber: #f5a623;
    --coral: #ff6b6b;
    --green: #4ade80;
    --pink: #f472b6;
    --blue: #60a5fa;
    --orange: #fb923c;
    --r: 12px;
    --r2: 8px;
  }
  [data-theme="light"] {
    --bg: #f5f5f8;
    --bg2: #ebebf0;
    --bg3: #e0e0e8;
    --bg4: #d5d5e0;
    --surface: #ffffff;
    --surface2: #f8f8fc;
    --border: rgba(0,0,0,0.07);
    --border2: rgba(0,0,0,0.12);
    --text: #0f0f1a;
    --text2: #4a4a62;
    --text3: #9090a8;
    --accent: #6355e8;
    --accent2: #4f42d4;
    --accent-glow: rgba(99,85,232,0.1);
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    transition: background 0.3s, color 0.3s;
  }
  /* NAV */
  nav {
    position: sticky; top: 0; z-index: 100;
    background: rgba(10,10,15,0.85);
    backdrop-filter: blur(20px);
    border-bottom: 1px solid var(--border);
    padding: 0 24px;
    height: 60px;
    display: flex; align-items: center; justify-content: space-between;
    transition: background 0.3s;
  }
  [data-theme="light"] nav { background: rgba(245,245,248,0.85); }
  .nav-logo {
    font-family: 'Syne', sans-serif;
    font-weight: 800;
    font-size: 20px;
    letter-spacing: -0.5px;
    color: var(--text);
    display: flex; align-items: center; gap: 8px;
  }
  .logo-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--accent); display: inline-block; }
  .nav-right { display: flex; align-items: center; gap: 12px; }
  .theme-toggle {
    width: 36px; height: 36px; border-radius: 8px;
    border: 1px solid var(--border2);
    background: var(--surface);
    color: var(--text2);
    cursor: pointer; font-size: 16px;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.2s;
  }
  .theme-toggle:hover { background: var(--surface2); color: var(--text); }
  .submit-btn {
    padding: 8px 16px; border-radius: 8px;
    background: var(--accent); color: #fff;
    border: none; cursor: pointer;
    font-family: 'DM Sans', sans-serif;
    font-size: 14px; font-weight: 500;
    transition: all 0.2s;
  }
  .submit-btn:hover { background: var(--accent2); transform: translateY(-1px); }

  /* HERO */
  .hero {
    padding: 60px 24px 40px;
    text-align: center;
    max-width: 700px;
    margin: 0 auto;
  }
  .hero-badge {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 5px 12px; border-radius: 100px;
    background: var(--accent-glow);
    border: 1px solid rgba(124,106,247,0.25);
    font-size: 12px; font-weight: 500; color: var(--accent);
    margin-bottom: 20px;
    letter-spacing: 0.5px;
  }
  .hero h1 {
    font-family: 'Syne', sans-serif;
    font-size: clamp(32px, 6vw, 56px);
    font-weight: 800;
    line-height: 1.1;
    letter-spacing: -1.5px;
    margin-bottom: 16px;
    color: var(--text);
  }
  .hero h1 span { color: var(--accent); }
  .hero p {
    color: var(--text2); font-size: 16px; line-height: 1.7;
    margin-bottom: 32px;
  }
  /* SEARCH */
  .search-wrap {
    position: relative;
    max-width: 520px;
    margin: 0 auto;
  }
  .search-icon {
    position: absolute; left: 16px; top: 50%; transform: translateY(-50%);
    color: var(--text3); font-size: 18px; pointer-events: none;
  }
  #search {
    width: 100%;
    padding: 14px 16px 14px 46px;
    border-radius: 12px;
    background: var(--surface);
    border: 1px solid var(--border2);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 15px;
    outline: none;
    transition: border 0.2s, box-shadow 0.2s;
  }
  #search:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px var(--accent-glow);
  }
  #search::placeholder { color: var(--text3); }
  .search-count {
    position: absolute; right: 16px; top: 50%; transform: translateY(-50%);
    font-size: 12px; color: var(--text3); font-weight: 500;
  }

  /* MAIN */
  .main {
    max-width: 1200px;
    margin: 0 auto;
    padding: 0 24px 80px;
    display: grid;
    grid-template-columns: 220px 1fr;
    gap: 32px;
    align-items: start;
  }
  @media (max-width: 768px) {
    .main { grid-template-columns: 1fr; padding: 0 16px 60px; }
    .sidebar { position: static !important; }
  }

  /* SIDEBAR */
  .sidebar {
    position: sticky;
    top: 76px;
  }
  .sidebar-title {
    font-size: 11px; font-weight: 600; letter-spacing: 1.5px;
    text-transform: uppercase; color: var(--text3);
    margin-bottom: 10px; padding: 0 4px;
  }
  .cat-list { display: flex; flex-direction: column; gap: 2px; }
  .cat-btn {
    display: flex; align-items: center; gap: 10px;
    padding: 9px 12px; border-radius: 8px;
    border: none; background: transparent;
    color: var(--text2); cursor: pointer;
    font-family: 'DM Sans', sans-serif;
    font-size: 14px; font-weight: 400;
    text-align: left; width: 100%;
    transition: all 0.15s;
  }
  .cat-btn:hover { background: var(--surface); color: var(--text); }
  .cat-btn.active { background: var(--accent-glow); color: var(--accent); font-weight: 500; }
  .cat-icon { font-size: 16px; width: 20px; text-align: center; }
  .cat-count {
    margin-left: auto;
    font-size: 11px; font-weight: 600;
    color: var(--text3);
    background: var(--bg4);
    padding: 2px 7px; border-radius: 10px;
  }
  .cat-btn.active .cat-count { background: rgba(124,106,247,0.2); color: var(--accent); }

  .sidebar-divider { height: 1px; background: var(--border); margin: 16px 4px; }
  .tag-section-title {
    font-size: 11px; font-weight: 600; letter-spacing: 1.5px;
    text-transform: uppercase; color: var(--text3);
    margin-bottom: 10px; padding: 0 4px;
  }
  .tags-list { display: flex; flex-wrap: wrap; gap: 6px; padding: 0 2px; }
  .tag-pill {
    padding: 4px 10px; border-radius: 100px;
    border: 1px solid var(--border2);
    background: transparent;
    color: var(--text2); cursor: pointer;
    font-family: 'DM Sans', sans-serif;
    font-size: 12px; font-weight: 400;
    transition: all 0.15s;
  }
  .tag-pill:hover { border-color: var(--accent); color: var(--accent); }
  .tag-pill.active { background: var(--accent); border-color: var(--accent); color: #fff; }

  /* CONTENT */
  .content-header {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 24px; padding-top: 8px;
  }
  .content-title {
    font-family: 'Syne', sans-serif;
    font-size: 20px; font-weight: 700;
    color: var(--text); letter-spacing: -0.5px;
  }
  .content-meta { font-size: 13px; color: var(--text3); }

  /* SORT */
  .sort-bar {
    display: flex; gap: 4px; align-items: center;
    margin-bottom: 20px; flex-wrap: wrap;
  }
  .sort-btn {
    padding: 5px 12px; border-radius: 6px;
    border: 1px solid var(--border);
    background: transparent; color: var(--text2);
    cursor: pointer; font-size: 12px; font-weight: 500;
    font-family: 'DM Sans', sans-serif;
    transition: all 0.15s;
  }
  .sort-btn.active { background: var(--surface2); color: var(--text); border-color: var(--border2); }

  /* GRID */
  .tools-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 16px;
  }
  @media (max-width: 480px) {
    .tools-grid { grid-template-columns: 1fr; }
  }

  .tool-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--r);
    padding: 20px;
    cursor: pointer;
    transition: all 0.2s;
    position: relative;
    overflow: hidden;
    animation: fadeIn 0.4s ease both;
  }
  .tool-card::before {
    content: '';
    position: absolute; top: 0; left: 0; right: 0;
    height: 2px;
    opacity: 0;
    transition: opacity 0.2s;
  }
  .tool-card:hover { border-color: var(--border2); transform: translateY(-2px); box-shadow: 0 8px 30px rgba(0,0,0,0.2); }
  .tool-card:hover::before { opacity: 1; }

  .card-top { display: flex; align-items: flex-start; gap: 12px; margin-bottom: 12px; }
  .card-icon {
    width: 44px; height: 44px; border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    font-size: 22px; flex-shrink: 0;
    border: 1px solid var(--border);
  }
  .card-meta { flex: 1; min-width: 0; }
  .card-name {
    font-family: 'Syne', sans-serif;
    font-size: 15px; font-weight: 700;
    color: var(--text); margin-bottom: 3px;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .card-cat {
    font-size: 11px; font-weight: 500; letter-spacing: 0.5px;
    text-transform: uppercase; color: var(--text3);
  }
  .card-badge {
    font-size: 10px; font-weight: 600; letter-spacing: 0.5px;
    padding: 3px 8px; border-radius: 4px;
    text-transform: uppercase; flex-shrink: 0;
  }
  .badge-free { background: rgba(74,222,128,0.12); color: var(--green); }
  .badge-paid { background: rgba(251,146,60,0.12); color: var(--orange); }
  .badge-freemium { background: rgba(96,165,250,0.12); color: var(--blue); }
  .badge-new { background: rgba(244,114,182,0.12); color: var(--pink); }

  .card-desc {
    font-size: 13px; color: var(--text2);
    line-height: 1.6;
    margin-bottom: 14px;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }
  .card-tags { display: flex; flex-wrap: wrap; gap: 5px; margin-bottom: 14px; }
  .card-tag {
    font-size: 11px; padding: 3px 8px; border-radius: 4px;
    border: 1px solid var(--border); color: var(--text3);
    background: transparent;
    cursor: pointer;
    transition: all 0.15s;
  }
  .card-tag:hover { border-color: var(--accent); color: var(--accent); }
  .card-footer {
    display: flex; align-items: center; justify-content: space-between;
    padding-top: 12px; border-top: 1px solid var(--border);
  }
  .card-stars { display: flex; align-items: center; gap: 4px; font-size: 12px; color: var(--text3); }
  .star { color: var(--amber); font-size: 13px; }
  .visit-btn {
    font-size: 12px; font-weight: 500; color: var(--accent);
    display: flex; align-items: center; gap: 4px;
    text-decoration: none; padding: 5px 10px;
    border-radius: 6px; border: 1px solid rgba(124,106,247,0.25);
    background: var(--accent-glow);
    transition: all 0.15s;
  }
  .visit-btn:hover { background: rgba(124,106,247,0.25); }
  .visit-arrow { font-size: 14px; }

  .hot-dot {
    width: 6px; height: 6px; border-radius: 50%;
    background: var(--coral);
    display: inline-block; margin-left: 4px;
    animation: pulse 2s infinite;
  }
  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.3; }
  }
  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .empty-state {
    grid-column: 1/-1;
    text-align: center;
    padding: 60px 20px;
    color: var(--text3);
  }
  .empty-state .empty-icon { font-size: 48px; margin-bottom: 16px; }
  .empty-state p { font-size: 15px; }

  /* mobile cats */
  .mobile-cats {
    display: none;
    overflow-x: auto;
    gap: 8px;
    padding: 16px 16px 0;
    -webkit-overflow-scrolling: touch;
    scrollbar-width: none;
  }
  .mobile-cats::-webkit-scrollbar { display: none; }
  @media (max-width: 768px) {
    .mobile-cats { display: flex; }
    .sidebar { display: none; }
  }
  .mobile-cat-btn {
    flex-shrink: 0;
    padding: 7px 14px; border-radius: 100px;
    border: 1px solid var(--border2);
    background: var(--surface); color: var(--text2);
    cursor: pointer; font-family: 'DM Sans', sans-serif;
    font-size: 13px; font-weight: 400;
    transition: all 0.15s;
    white-space: nowrap;
  }
  .mobile-cat-btn.active { background: var(--accent); border-color: var(--accent); color: #fff; }

  /* mobile tags */
  .mobile-tags {
    display: none;
    overflow-x: auto;
    gap: 6px;
    padding: 10px 16px 0;
    -webkit-overflow-scrolling: touch;
    scrollbar-width: none;
  }
  .mobile-tags::-webkit-scrollbar { display: none; }
  @media (max-width: 768px) { .mobile-tags { display: flex; } }

  /* color accent per category */
  .tool-card[data-cat="写作"] .card-icon { background: rgba(124,106,247,0.1); }
  .tool-card[data-cat="写作"]::before { background: var(--accent); }
  .tool-card[data-cat="图像"] .card-icon { background: rgba(245,166,35,0.1); }
  .tool-card[data-cat="图像"]::before { background: var(--amber); }
  .tool-card[data-cat="音频"] .card-icon { background: rgba(255,107,107,0.1); }
  .tool-card[data-cat="音频"]::before { background: var(--coral); }
  .tool-card[data-cat="视频"] .card-icon { background: rgba(244,114,182,0.1); }
  .tool-card[data-cat="视频"]::before { background: var(--pink); }
  .tool-card[data-cat="编程"] .card-icon { background: rgba(45,224,196,0.1); }
  .tool-card[data-cat="编程"]::before { background: var(--teal); }
  .tool-card[data-cat="效率"] .card-icon { background: rgba(96,165,250,0.1); }
  .tool-card[data-cat="效率"]::before { background: var(--blue); }
  .tool-card[data-cat="搜索"] .card-icon { background: rgba(74,222,128,0.1); }
  .tool-card[data-cat="搜索"]::before { background: var(--green); }
  .tool-card[data-cat="多模态"] .card-icon { background: rgba(251,146,60,0.1); }
  .tool-card[data-cat="多模态"]::before { background: var(--orange); }

  /* footer */
  footer {
    text-align: center; padding: 24px;
    border-top: 1px solid var(--border);
    color: var(--text3); font-size: 13px;
  }
  footer a { color: var(--accent); text-decoration: none; }
</style>
</head>
<body>

<nav>
  <div class="nav-logo">
    <span class="logo-dot"></span>
    AIverse
  </div>
  <div class="nav-right">
    <button class="theme-toggle" id="themeBtn" title="切换主题">🌙</button>
    <button class="submit-btn">提交工具</button>
  </div>

</div>

<div class="mobile-cats" id="mobileCats"></div>
<div class="mobile-tags" id="mobileTags"></div>

<div class="main">
  <aside class="sidebar">
    <div class="sidebar-title">分类</div>
    <div class="cat-list" id="catList"></div>
    <div class="sidebar-divider"></div>
    <div class="tag-section-title">标签筛选</div>
    <div class="tags-list" id="tagsList"></div>
  </aside>

  <div>
    <div class="content-header">
      <div class="content-title" id="contentTitle">全部工具</div>

    <div class="tools-grid" id="toolsGrid"></div>
  </div>
</div>

<footer>
  <p>© 2025 AIverse · 持续收录优质 AI 工具 · <a href="#">提交工具</a> · <a href="#">关于我们</a></p>
</footer>

const categories = [
  { name:"全部", icon:"⚡" },
  { name:"写作", icon:"✍️" },
  { name:"图像", icon:"🎨" },
  { name:"音频", icon:"🎵" },
  { name:"视频", icon:"🎬" },
  { name:"编程", icon:"👾" },
  { name:"效率", icon:"📝" },
  { name:"搜索", icon:"🔍" },
  { name:"多模态", icon:"🌈" },
];

const allTags = [...new Set(tools.flatMap(t => t.tags))];

let activeCat = "全部";
let activeTags = [];
let sortMode = "default";
let searchQ = "";

function countForCat(cat) {
  return cat === "全部" ? tools.length : tools.filter(t => t.cat === cat).length;
}

function buildSidebar() {
  const cl = document.getElementById("catList");
  cl.innerHTML = categories.map(c => `
    <button class="cat-btn ${activeCat===c.name?'active':''}" data-cat="${c.name}">
      <span class="cat-icon">${c.icon}</span>
      ${c.name}
      <span class="cat-count">${countForCat(c.name)}</span>
    </button>
  `).join('');

  const tl = document.getElementById("tagsList");
  tl.innerHTML = allTags.slice(0,18).map(t => `
    <button class="tag-pill ${activeTags.includes(t)?'active':''}" data-tag="${t}">${t}</button>
  `).join('');

  cl.querySelectorAll('.cat-btn').forEach(b => b.addEventListener('click', () => {
    activeCat = b.dataset.cat; render();
  }));
  tl.querySelectorAll('.tag-pill').forEach(b => b.addEventListener('click', () => {
    const tag = b.dataset.tag;
    if(activeTags.includes(tag)) activeTags = activeTags.filter(x=>x!==tag);
    else activeTags.push(tag);
    render();
  }));
}

function buildMobile() {
  const mc = document.getElementById("mobileCats");
  mc.innerHTML = categories.map(c => `
    <button class="mobile-cat-btn ${activeCat===c.name?'active':''}" data-cat="${c.name}">${c.icon} ${c.name}</button>
  `).join('');
  mc.querySelectorAll('.mobile-cat-btn').forEach(b => b.addEventListener('click', () => {
    activeCat = b.dataset.cat; render();
  }));

  const mt = document.getElementById("mobileTags");
  mt.innerHTML = allTags.slice(0,12).map(t => `
    <button class="tag-pill ${activeTags.includes(t)?'active':''}" data-tag="${t}">${t}</button>
  `).join('');
  mt.querySelectorAll('.tag-pill').forEach(b => b.addEventListener('click', () => {
    const tag = b.dataset.tag;
    if(activeTags.includes(tag)) activeTags = activeTags.filter(x=>x!==tag);
    else activeTags.push(tag);
    render();
  }));
}

function getFiltered() {
  let list = [...tools];
  if(activeCat !== "全部") list = list.filter(t => t.cat === activeCat);
  if(activeTags.length > 0) list = list.filter(t => activeTags.every(tag => t.tags.includes(tag)));
  if(searchQ) {
    const q = searchQ.toLowerCase();
    list = list.filter(t => t.name.toLowerCase().includes(q) || t.desc.includes(q) || t.tags.some(tag=>tag.includes(q)));
  }
  if(sortMode === "rating") list.sort((a,b) => b.rating - a.rating);
  else if(sortMode === "hot") list = [...list.filter(t=>t.hot), ...list.filter(t=>!t.hot)];
  else if(sortMode === "new") list = [...list.filter(t=>t.isNew), ...list.filter(t=>!t.isNew)];
  return list;
}

function starHTML(r) {
  const full = Math.floor(r);
  let s = '';
  for(let i=0;i<5;i++) s += `<span class="star">${i<full?'★':'☆'}</span>`;
  return s;
}

function priceBadge(p) {
  const map = { free:["free","免费"], paid:["paid","付费"], freemium:["freemium","免费+"], };
  const [cls,label] = map[p] || ["free","免费"];
  return `<span class="card-badge badge-${cls}">${label}</span>`;
}

function render() {
  buildSidebar();
  buildMobile();

  const list = getFiltered();
  const title = activeCat === "全部" ? "全部工具" : activeCat + " 工具";
  document.getElementById("contentTitle").textContent = title;
  document.getElementById("contentMeta").textContent = `共 ${list.length} 个工具`;
  document.getElementById("searchCount").textContent = searchQ ? `${list.length} 个结果` : '';

  const grid = document.getElementById("toolsGrid");
  if(list.length === 0) {
    grid.innerHTML = `<div class="empty-state"><div class="empty-icon">🔭</div><p>没有找到匹配的工具，换个关键词试试？</p></div>`;
    return;
  }

  grid.innerHTML = list.map((t,i) => `
    <div class="tool-card" data-cat="${t.cat}" style="animation-delay:${i*0.04}s">
      <div class="card-top">
        <div class="card-icon">${t.icon}</div>
        <div class="card-meta">
          <div class="card-name">${t.name}${t.hot?`<span class="hot-dot"></span>`:''}</div>
          <div class="card-cat">${t.cat}</div>
        </div>
        ${priceBadge(t.price)}
        ${t.isNew?`<span class="card-badge badge-new" style="margin-left:4px">新</span>`:''}
      </div>
      <p class="card-desc">${t.desc}</p>
      <div class="card-tags">${t.tags.map(tag=>`<span class="card-tag" data-tag="${tag}">${tag}</span>`).join('')}</div>
      <div class="card-footer">
        <div class="card-stars">${starHTML(t.rating)} <span style="margin-left:4px">${t.rating}</span></div>
        <a class="visit-btn" href="${t.url}" target="_blank">访问 <span class="visit-arrow">↗</span></a>
      </div>
    </div>
  `).join('');

  grid.querySelectorAll('.card-tag').forEach(b => b.addEventListener('click', e => {
    e.stopPropagation();
    const tag = b.dataset.tag;
    if(activeTags.includes(tag)) activeTags = activeTags.filter(x=>x!==tag);
    else activeTags.push(tag);
    render();
  }));
}

document.getElementById("search").addEventListener("input", e => {
  searchQ = e.target.value.trim();
  render();
});

document.querySelectorAll('.sort-btn').forEach(b => {
  b.addEventListener('click', () => {
    document.querySelectorAll('.sort-btn').forEach(x=>x.classList.remove('active'));
    b.classList.add('active');
    sortMode = b.dataset.sort;
    render();
  });
});

const themeBtn = document.getElementById("themeBtn");
let isLight = false;
themeBtn.addEventListener("click", () => {
  isLight = !isLight;
  document.documentElement.dataset.theme = isLight ? "light" : "";
  themeBtn.textContent = isLight ? "🌑" : "🌙";
});

render();
</script>
</body>
</html>
